<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Green Login System</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-green: #27ae60;
            --bg-color: #f0f4f1;
            --text-dark: #2c3e50;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            color: var(--text-dark);
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .login-card {
            background: var(--white);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.15);
            text-align: center;
        }

        .login-card h2 {
            margin: 0 0 8px;
            color: var(--dark-green);
            font-size: 28px;
        }

        .login-card p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-login {
            background-color: var(--primary-green);
            color: white;
        }

        .btn-login:hover {
            background-color: var(--dark-green);
            transform: translateY(-2px);
        }

        .btn-reg {
            background-color: #ecf0f1;
            color: var(--text-dark);
        }

        .btn-reg:hover {
            background-color: #bdc3c7;
        }

        #message {
            margin-top: 20px;
            font-size: 14.5px;
            font-weight: 600;
            min-height: 20px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--white);
            padding: 35px 25px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .check-icon {
            width: 65px;
            height: 65px;
            background: var(--primary-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Please enter your details</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <div class="button-group">
                <button class="btn-login" onclick="handleLogin()">Login</button>
                <button class="btn-reg" onclick="handleRegister()">Register</button>
            </div>
            
            <p id="message"></p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="check-icon">✔</div>
            <h3>Login Successful!</h3>
            <p>You don enter boss!</p>
            <button class="btn-login" onclick="closeModal()">Continue</button>
        </div>
    </div>

    <script>
        function handleRegister() {
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();
            const msg = document.getElementById('message');

            if (!user || !pass) {
                msg.style.color = "red";
                msg.innerText = "Fill both fields!";
                return;
            }

            if (localStorage.getItem(user)) {
                msg.style.color = "orange";
                msg.innerText = "User already exists!";
                return;
            }

            localStorage.setItem(user, pass);
            msg.style.color = "green";
            msg.innerText = "✅ Registration Successful!";
        }

        function handleLogin() {
            let user = document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();
            const msg = document.getElementById('message');

            if (!user || !pass) {
                msg.style.color = "red";
                msg.innerText = "Enter username and password!";
                return;
            }

            const storedPass = localStorage.getItem(user);

            if (storedPass && storedPass === pass) {
                msg.innerText = "";
                showSuccess();
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ Wrong username or password!";
            }
        }

        function showSuccess() {
            document.getElementById('successModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // Press Enter to login
        document.addEventListener('keypress', (e) => {
            if (e.key === "Enter") handleLogin();
        });
    </script>
</body>
</html>
